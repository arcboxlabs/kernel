name: Build and Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Linux kernel version (e.g. 6.12.0)"
        required: false
        default: "6.12.0"
        type: string

permissions:
  contents: write

env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.12.0' }}

jobs:
  # ==========================================================================
  # Build kernel for each architecture (native runners, no cross-compile).
  # ==========================================================================
  build-kernel:
    name: Build Kernel (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libelf-dev curl xz-utils

      - name: Download kernel source
        run: |
          curl -sL "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.KERNEL_VERSION }}.tar.xz" \
            | tar -xJ

      - name: Build kernel
        run: |
          cd "linux-${{ env.KERNEL_VERSION }}"
          cp "../configs/arcbox-${{ matrix.arch }}.config" .config
          make olddefconfig
          make -j"$(nproc)"

          mkdir -p ../output
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            cp arch/arm64/boot/Image "../output/kernel-${{ matrix.arch }}"
          else
            cp arch/x86/boot/bzImage "../output/kernel-${{ matrix.arch }}"
          fi

      - name: Generate checksum
        run: |
          cd output
          sha256sum "kernel-${{ matrix.arch }}" > "kernel-${{ matrix.arch }}.sha256"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: |
            output/kernel-${{ matrix.arch }}
            output/kernel-${{ matrix.arch }}.sha256
          retention-days: 14

  # ==========================================================================
  # Create GitHub Release with bare kernel binaries (tag pushes only).
  # ==========================================================================
  release:
    name: Create Release
    needs: build-kernel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for ARCH in arm64 x86_64; do
            DIR="artifacts/kernel-$ARCH"
            if [ -f "$DIR/kernel-$ARCH" ]; then
              cp "$DIR/kernel-$ARCH" "release/kernel-$ARCH"
              cp "$DIR/kernel-$ARCH.sha256" "release/kernel-$ARCH.sha256"
            fi
          done
          echo "=== Release files ==="
          ls -lh release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Kernel ${{ github.ref_name }}

            Self-compiled Linux kernel for ArcBox VMs (`CONFIG_MODULES=n`, all drivers built-in).

            ### Files
            - `kernel-arm64` — ARM64 Image (Apple Silicon / ARM VMs)
            - `kernel-x86_64` — x86_64 bzImage
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
